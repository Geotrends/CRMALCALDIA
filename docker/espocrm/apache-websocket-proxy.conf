# Reenvía /ws al contenedor espocrm-websocket (misma red Docker).
# Dokploy solo expone el servicio espocrm; el navegador usa wss://dominio/ws.
<IfModule mod_proxy.c>
    ProxyPreserveHost On
    ProxyRequests Off

    <Location /ws>
        ProxyPass ws://espocrm-websocket:8080/ws
        ProxyPassReverse ws://espocrm-websocket:8080/ws
    </Location>
</IfModule>
